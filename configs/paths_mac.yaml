# macOS-specific path overrides
# Usage: python -m src.training.train_logistic --config configs/paths_mac.yaml

paths:
  project_root: "."
  fwi_dir:  "data/fwi_data"
  ffmc_dir: "data/ffmc_data"
  dmc_dir:  "data/dmc_data"
  dc_dir:   "data/dc_data"
  isi_dir:  "data/isi_data"
  bui_dir:  "data/bui_data"
  ecmwf_dir: "data/ecmwf_reproject"
  era5_dir: "data/era5_on_fwi_grid"
  observation_dir: "data/ecmwf_reproject"
  # V2 model: ERA5-derived per-variable dirs (populated after GRIB→TIF processing)
  wind_u_dir: "data/era5_wind_u"
  wind_v_dir: "data/era5_wind_v"
  precip_dir: "data/era5_precip"
  cape_dir:   "data/era5_cape"
  # V2 model: static fire-frequency climatology
  fire_climatology_tif: "data/fire_climatology.tif"
  ciffc_csv: "data/ciffc.csv"
  output_dir: "outputs"
  checkpoint_dir: "checkpoints"
